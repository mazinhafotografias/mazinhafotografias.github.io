<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazinha Fotografa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Open+Sans&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      color: #333;
      background-color: #fff;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 2rem;
    }
    header img {
      max-height: 120px;
    }
    .hero {
      background: url('https://via.placeholder.com/1200x600') center/cover no-repeat;
      color: white;
      text-align: center;
      padding: 6rem 1rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
    }
    .section {
      padding: 4rem 2rem;
      max-width: 900px;
      margin: auto;
    }
    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }
    .gallery div {
      background: #f0f0f0;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
    }
    footer {
      background: #333;
      color: white;
      padding: 2rem;
      text-align: center;
    }
    footer a {
      color: white;
      margin: 0 0.5rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <img src="utilitarios/logo01.png" alt="Mazinha Fotografa">
  </header>

  <section class="hero">
    <h1>Fotógrafa com mais de 25 anos de experiência 📷</h1>
  </section>

  <section class="section">
    <h2>Sobre</h2>
    <p>Fotógrafa profissional e amo o que faço, com mais de 25 anos de experiência e trabalhando em conjunto com a empresa Art Cores.</p>
  </section>

  <section class="section">
    <h2>Portfólio</h2>
    <div class="gallery">
      <div>Foto 1</div>
      <div>Foto 2</div>
      <div>Foto 3</div>
      <div>Foto 4</div>
    </div>
  </section>

  <footer>
    <p>Contato:</p>
    <a href="https://api.whatsapp.com/send?phone=558899563800" target="_blank">WhatsApp</a> |
    <a href="https://www.instagram.com/mazinhafotografa/" target="_blank">Instagram</a> |
    <a href="https://linktr.ee/mazinhafotografa" target="_blank">Linktree</a>
    <p>&copy; 2025 Mazinha Fotografa</p>
  </footer>
</body>
</html>
